<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis XV Años - Invitación Ranchera</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
</head>

<body>
    <main class="invitation-container simple-view">
        <div class="composite-container">
            <img src="assets/img/rueda.png" alt="Rueda Izquierda" id="rueda-left">
            <img src="assets/img/persona.png" alt="Quinceañera" id="persona-img">
            <img src="assets/img/caballo.png" alt="Caballo" id="horse-img">
            <img src="assets/img/flores-principal.png" alt="Flores" id="flowers-img">
            <img src="assets/img/rueda.png" alt="Rueda Derecha" id="rueda-right">
        </div>

        <section class="text-info">
            <p class="title-years">Mis <span class="number-15">15</span> Años</p>
            <h1 class="celebrant-name">Yareni Guadalupe</h1>
            <p class="celebrant-last-name">Hernández Luna</p>
        </section>

        <section id="countdown-container" class="reveal">
            <h2 class="countdown-title">Nos vemos en:</h2>
            <div id="countdown">
                <div class="countdown-item">
                    <span id="days">00</span>
                    <p>días</p>
                </div>
                <div class="separator">:</div>
                <div class="countdown-item">
                    <span id="hours">00</span>
                    <p>horas</p>
                </div>
                <div class="separator">:</div>
                <div class="countdown-item">
                    <span id="minutes">00</span>
                    <p>minutos</p>
                </div>
                <div class="separator">:</div>
                <div class="countdown-item">
                    <span id="seconds">00</span>
                    <p>segundos</p>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
